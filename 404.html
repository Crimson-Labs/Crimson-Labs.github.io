<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Crimson</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --card: rgba(14, 14, 14, 0.88);
      --border: rgba(255,255,255,0.06);
      --red: #ff2b2b;
      --soft: #9f9f9f;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,0,0,0.14), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,0,0,0.08), transparent 30%),
        linear-gradient(180deg, #090909 0%, #000000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 30px;
      color: white;
      position: relative;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,1), transparent);
      pointer-events: none;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(255,0,0,0.12);
      filter: blur(120px);
      top: -200px;
      right: -150px;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      border-radius: 32px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
    }

    .left {
      padding: 70px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 30px;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #d5d5d5;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 12px var(--red);
    }

    h1 {
      font-size: clamp(5rem, 10vw, 8rem);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -4px;
      margin-bottom: 24px;
    }

    h1 span {
      color: var(--red);
    }

    p {
      color: var(--soft);
      line-height: 1.8;
      font-size: 1.05rem;
      max-width: 520px;
      margin-bottom: 40px;
    }

    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 18px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.25s ease;
    }

    .primary {
      background: linear-gradient(135deg, #d10000, #700000);
      color: white;
      box-shadow: 0 0 25px rgba(255,0,0,0.25);
    }

    .primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(255,0,0,0.35);
    }

    .secondary {
      border: 1px solid rgba(255,255,255,0.08);
      color: #d3d3d3;
      background: rgba(255,255,255,0.02);
    }

    .secondary:hover {
      background: rgba(255,255,255,0.05);
    }

    .right {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-left: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .huge404 {
      font-size: 16rem;
      font-weight: 800;
      color: rgba(255,255,255,0.03);
      position: absolute;
      user-select: none;
    }

    .symbol {
      width: 170px;
      height: 170px;
      border-radius: 32px;
      background:
        linear-gradient(145deg, rgba(255,0,0,0.2), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255,0,0,0.18);
      z-index: 2;
    }

    .symbol svg {
      width: 80px;
      height: 80px;
      stroke: var(--red);
    }

    @media (max-width: 900px) {
      .card {
        grid-template-columns: 1fr;
      }

      .right {
        min-height: 280px;
      }

      .left {
        padding: 45px;
      }

      h1 {
        font-size: 4.5rem;
      }
    }

    @media (max-width: 560px) {
      .left {
        padding: 35px;
      }

      h1 {
        font-size: 3.5rem;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="grid"></div>
  <div class="glow"></div>

  <main class="card">

    <section class="left">

      <div class="badge">
        <div class="dot"></div>
        Crimson Error
      </div>

      <h1>404<br><span>Not Found.</span></h1>

      <p>
        The page you are looking for does not exist,
        was removed, or never belonged here.
      </p>

      <div class="actions">
        <a href="/" class="btn primary">
          Back Home
        </a>

        <a href="javascript:history.back()" class="btn secondary">
          Go Back
        </a>
      </div>

    </section>

    <section class="right">

      <div class="huge404">404</div>

      <div class="symbol">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v4m0 4h.01M10.29 3.86l-7.1 12.28A2 2 0 0 0 4.9 19h14.2a2 2 0 0 0 1.73-2.86l-7.1-12.28a2 2 0 0 0-3.46 0Z"/>
        </svg>
      </div>

    </section>

  </main>

</body>
</html>
