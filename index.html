<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crimson Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #220000 0%, #090909 55%, #000000 100%);
      color: white;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(180, 0, 0, 0.15);
      filter: blur(120px);
      border-radius: 50%;
      z-index: 0;
    }

    .glow.one {
      top: -180px;
      left: -120px;
    }

    .glow.two {
      bottom: -200px;
      right: -120px;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      background: rgba(15, 15, 15, 0.72);
      border: 1px solid rgba(255, 0, 0, 0.15);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 60px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 50px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 30px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #d1d1d1;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(145deg, #ff1e1e, #660000);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(255,0,0,0.35);
    }

    h1 {
      font-size: clamp(3rem, 7vw, 5.4rem);
      line-height: 0.95;
      margin-bottom: 24px;
      font-weight: 800;
    }

    h1 span {
      color: #ff3d3d;
    }

    p {
      color: #b7b7b7;
      font-size: 1.08rem;
      line-height: 1.8;
      max-width: 560px;
    }

    .status {
      margin-top: 35px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #d9d9d9;
      font-size: 0.95rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff1e1e;
      box-shadow: 0 0 12px #ff1e1e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    .construction {
      position: relative;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 420px;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1), transparent);
    }

    .crane {
      position: relative;
      width: 260px;
      height: 320px;
    }

    .tower {
      position: absolute;
      left: 55px;
      bottom: 0;
      width: 18px;
      height: 240px;
      background: linear-gradient(to bottom, #ff4b4b, #7a0000);
      box-shadow: 0 0 18px rgba(255,0,0,0.35);
    }

    .arm {
      position: absolute;
      left: 55px;
      top: 55px;
      width: 170px;
      height: 12px;
      background: linear-gradient(to right, #ff4b4b, #7a0000);
    }

    .counter {
      position: absolute;
      left: 0;
      top: 55px;
      width: 60px;
      height: 10px;
      background: #520000;
    }

    .cable {
      position: absolute;
      right: 40px;
      top: 65px;
      width: 2px;
      height: 110px;
      background: rgba(255,255,255,0.5);
    }

    .hook {
      position: absolute;
      right: 28px;
      top: 170px;
      width: 28px;
      height: 28px;
      border: 4px solid #ff3b3b;
      border-top: transparent;
      border-radius: 0 0 50% 50%;
    }

    .base {
      position: absolute;
      bottom: 0;
      left: 20px;
      width: 100px;
      height: 18px;
      background: #2a2a2a;
      border-radius: 12px;
    }

    .side-text {
      position: absolute;
      right: -30px;
      bottom: 20px;
      transform: rotate(-90deg);
      letter-spacing: 6px;
      color: rgba(255,255,255,0.12);
      font-size: 0.8rem;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .card {
        grid-template-columns: 1fr;
        padding: 35px;
      }

      .construction {
        min-height: 300px;
      }

      h1 {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="card">
    <section>
      <div class="brand">
        <div class="brand-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="white" stroke-width="2"/>
            <path d="M8 12L11 15L16 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Crimson Labs
      </div>

      <h1>Hobby Projects<br><span>by lostinmyowntears</span></h1>

      <p>
        My website is currently under construction. We are crafting a clean,
      </p>

      <div class="status">
        <div class="dot"></div>
        Development in progress
      </div>
    </section>

    <section class="construction">
      <div class="grid"></div>

      <div class="crane">
        <div class="tower"></div>
        <div class="arm"></div>
        <div class="counter"></div>
        <div class="cable"></div>
        <div class="hook"></div>
        <div class="base"></div>
      </div>

      <div class="side-text">CRIMSON</div>
    </section>
  </main>
</body>
</html>
