      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/site.css" />

    <style>
      .me-bio {
        margin-top: 8px;
        margin-bottom: 14px;
        font-size: 0.95rem;
        opacity: 0.8;
        line-height: 1.5;
      }
    </style>
  </head>

  <body class="page-me" data-page="me">
    <header class="topbar-wrap">
      <div class="site-shell topbar-inner">
        <a class="brand" href="index.html">
          <img
            class="logo-mark"
            src="https://avatars.githubusercontent.com/u/284690579?v=4"
            alt="Crimson Labs avatar"
          />
          <span>Crimson <mark>Labs</mark></span>
        </a>

        <button class="nav-toggle" type="button" data-nav-toggle>
          Menu
        </button>

        <nav class="site-nav" data-nav>
          <a href="index.html">Home</a>
          <a href="themes.html">Themes</a>
          <a href="preview.html">Preview</a>
          <a href="download.html">Download</a>
          <a href="install.html">Install</a>
          <a href="credits.html">Credits</a>
          <a href="privacy.html">Legal</a>
          <a class="active" href="me.html">Me</a>
        </nav>
      </div>
    </header>

    <main class="site-shell">
      <section class="section me-stack">

        <article class="panel me-main-card fade-up" data-tilt>
          <img
            class="me-avatar-big"
            src="https://avatars.githubusercontent.com/u/284690579?v=4"
            alt="lostinmyowntears avatar"
          />

          <h2>lostinmyowntears</h2>

          <p class="me-handle">@tears</p>

          <p class="me-bio">
            coding random stuff & larping mostly.
          </p>

          <div class="badge-icons-row">

            <span class="badge-icon" data-tooltip="Founder">
              <img
                src="https://cdn3.emoji.gg/emojis/805331-crown.png"
                alt="Founder badge"
              />
            </span>

            <span class="badge-icon" data-tooltip="Theme Creator">
              <img
                src="https://cdn.simpleicons.org/css/ffffff"
                alt="Creator badge"
              />
            </span>

            <span class="badge-icon" data-tooltip="#1 Larp">
              <img
                src="https://cdn3.emoji.gg/emojis/940800-l-shredded.png"
                alt="larp badge"
              />
            </span>

            <span class="badge-icon" data-tooltip="Verified Or Partner">
              <img
                src="https://cdn3.emoji.gg/emojis/69896-partner.png"
                alt="partner badge"
              />
            </span>

          </div>
        </article>

        <article class="panel fade-up" data-tilt>
          <h3>Social Links</h3>

          <div class="social-list">

            <a
              class="social-link"
              href="https://github.com/Crimson-Labs"
              target="_blank"
              rel="noreferrer"
            >
              <img src="https://cdn.simpleicons.org/github/ffffff" alt="" />
              <span>GitHub</span>
            </a>

            <a
              class="social-link"
              href="https://discord.com/users/1503886610163433514"
              target="_blank"
              rel="noreferrer"
            >
              <img src="https://cdn.simpleicons.org/discord/ffffff" alt="" />
              <span>Discord</span>
            </a>

            <a
              class="social-link"
              href="https://www.tiktok.com/@cryptcursed"
              target="_blank"
              rel="noreferrer"
            >
              <img src="https://cdn.simpleicons.org/tiktok/ffffff" alt="" />
              <span>TikTok</span>
            </a>

            <a
              class="social-link"
              href="https://x.com/coinbaselarp"
              target="_blank"
              rel="noreferrer"
            >
              <img src="https://cdn.simpleicons.org/x/ffffff" alt="" />
              <span>X / Twitter</span>
            </a>

            <a
              class="social-link"
              href="https://www.roblox.com/users/10431694273/profile"
              target="_blank"
              rel="noreferrer"
            >
              <img src="https://cdn.simpleicons.org/roblox/ffffff" alt="" />
              <span>Roblox</span>
            </a>

          </div>
        </article>

        <article class="panel fade-up" data-music-player data-tilt>
          <h3>Music Player</h3>

          <p class="music-status" data-music-status>Paused</p>

          <audio data-audio preload="metadata">
            <source
              src="assets/audio/music.mp3"
              type="audio/mpeg"
            />
          </audio>

          <div class="music-controls">
            <button
              class="btn btn-primary"
              type="button"
              data-music-play
            >
              Play
            </button>

            <button
              class="btn btn-secondary"
              type="button"
              data-music-pause
            >
              Pause
            </button>

            <input
              class="music-slider"
              type="range"
              min="0"
              max="100"
              step="0.1"
              value="0"
              data-music-progress
            />

            <span class="music-time" data-music-time>
              0:00 / 0:00
            </span>
          </div>

          <div class="music-controls">
            <label>
              Volume

              <input
                class="music-slider"
                type="range"
                min="0"
                max="1"
                step="0.01"
                value="0.4"
                data-music-volume
              />
            </label>
          </div>
        </article>

      </section>
    </main>

    <footer class="site-shell footer">
      <p>
        <a
          href="https://github.com/Crimson-Labs"
          target="_blank"
          rel="noreferrer"
        >
          Crimson-Labs
        </a>

        |

        <span data-year>2026</span>

        |

        by

        <a
          href="https://discord.com/users/1503886610163433514"
          target="_blank"
          rel="noreferrer"
        >
          lostinmyowntears
        </a>
      </p>
    </footer>

    <script src="assets/data/themes.js"></script>
    <script src="assets/js/site.js"></script>

</html>
